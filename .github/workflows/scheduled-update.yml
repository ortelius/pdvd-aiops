name: Scheduled Dependency Update

on:
  schedule:
    - cron: "0 8 * * *" # Daily at 8 AM UTC
  workflow_dispatch: # Manual trigger

jobs:
  update-repos:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install project
        run: pip install .

      - name: Pull GitHub MCP Docker image
        run: docker pull ghcr.io/github/github-mcp-server

      - name: Run scheduled updates
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          REPO_PREFIX: pdvd
          REPO_OWNERS: ortelius
        run: python scripts/scheduled_update.py
