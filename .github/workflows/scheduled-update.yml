name: Scheduled Dependency Update

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8 AM UTC
  workflow_dispatch:       # Manual trigger

jobs:
  update-repos:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Pull GitHub MCP Docker image
        run: docker pull ghcr.io/github/github-mcp-server

      - name: Run scheduled updates
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_PAT }}
          REPO_PREFIX: pdvd
        run: python scripts/scheduled_update.py
